# Domilia — Configuration Upptime (page d'état publique)
# Source versionnée dans le repo principal : docs/security/status-page.upptimerc.yml
# Contrôle documenté : docs/security/status-page.md
# Réf. Upptime : https://upptime.js.org/docs/configuration

owner: Domilia-project
repo: status

# ── Services surveillés (composants visibles publiquement) ──────────────
sites:
  - name: Site web
    url: https://www.domilia.ca

  - name: Application
    url: https://app.domilia.ca

  - name: API
    url: https://api.domilia.ca/health
    # /health = liveness publique, renvoie 200 dès que le process HTTP tourne
    # (backend_new/src/bootstrap.ts). Reflète « le service répond ».

  # Décommenter pour une tuile « API incluant la base de données ».
  # /ready renvoie 503 tant que la DB n'est pas connectée → montrera
  # brièvement « dégradé » pendant les cold starts / déploiements (signal honnête).
  # - name: API — base de données
  #   url: https://api.domilia.ca/ready

  - name: Signature électronique
    url: https://signature.domilia.ca

# ── Site public généré ─────────────────────────────────────────────────
status-website:
  cname: status.domilia.ca
  name: Domilia — État des services
  introTitle: "**État des services Domilia**"
  introMessage: >-
    Disponibilité en temps réel des services Domilia et historique des incidents.
    Pour signaler un problème, écrivez à support@domilia.ca.
  navbar:
    - title: Accueil
      href: https://www.domilia.ca
    - title: État des services
      href: /
  logoUrl: https://www.domilia.ca/domilia-with-logo.svg
  favicon: https://www.domilia.ca/favicon.svg
  theme: light
  timezone: America/Toronto

# ── Notifications d'incident (optionnel — via secrets Actions) ──────────
# notifications:
#   - type: email
#     smtpHost: smtp.sendgrid.net        # relais SMTP SendGrid déjà en place
#     smtpPort: 587
#     smtpUsername: apikey
#     smtpPassword: $SMTP_PASSWORD        # secret Actions
#     smtpFrom: "Domilia Status <status@domilia.ca>"
#   - type: slack

assignees:
  - vincentgendreau

# ── Localisation française de l'interface ──────────────────────────────
i18n:
  activeIncidents: Incidents en cours
  allSystemsOperational: Tous les systèmes sont opérationnels
  incidents: Incidents
  incidentReport: "#$NUMBER : $TITLE"
  incidentTitle: Incident
  incidentDetails: Détails de l'incident
  navCommits: Commits
  navIncidents: Incidents
  navDashboard: Tableau de bord
  operational: Opérationnel
  degradedPerformance: Performance dégradée
  partialOutage: Panne partielle
  majorOutage: Panne majeure
  down: Hors service
  up: En service
  live: EN DIRECT
  pastIncidents: Historique des incidents
  overallUptime: Disponibilité globale
  overallStatus: État global
  lastXdays: "$DAYS derniers jours"
  responseTime: Temps de réponse
  uptime: Disponibilité
  fastResponseTime: Temps de réponse rapide
  slowResponseTime: Temps de réponse lent
  noData: Aucune donnée
  createIssues: Créer des incidents
  hoursMinutesSeconds: "$HOURS h $MINUTES min $SECONDS s"
  poweredBy: "Propulsé par $UPPTIME"

# Cadence de sonde (cron) laissée au défaut Upptime (~5 min).
